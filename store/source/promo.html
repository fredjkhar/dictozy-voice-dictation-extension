<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Dictation Promotional Tile</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 440px;
        height: 280px;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        background: #063c5b url("../assets/source/promo-illustration.png") center / cover no-repeat;
        color: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgb(3 31 49 / 78%) 0%, rgb(3 31 49 / 30%) 48%, transparent 75%);
        content: "";
      }

      .brand {
        position: absolute;
        z-index: 1;
        top: 28px;
        left: 28px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand img {
        width: 46px;
        height: 46px;
        border: 1px solid rgb(255 255 255 / 32%);
        border-radius: 8px;
        box-shadow: 0 10px 24px rgb(0 0 0 / 24%);
      }

      .brand strong {
        width: 150px;
        font-size: 26px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.04;
        text-shadow: 0 2px 10px rgb(0 0 0 / 28%);
      }

      .tagline {
        position: absolute;
        z-index: 1;
        left: 30px;
        bottom: 28px;
        margin: 0;
        color: #d8fbff;
        font-size: 14px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <img src="../../extension/icons/icon-128.png" alt="">
      <strong>Voice Dictation</strong>
    </div>
    <p class="tagline">Speak. Transcribe. Keep writing.</p>
  </body>
</html>
